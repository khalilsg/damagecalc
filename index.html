<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K Calc</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      padding: 24px;
      min-height: 100vh;
    }

    h1 {
      color: #58a6ff;
      margin-bottom: 4px;
      font-size: 1.6rem;
      letter-spacing: 3px;
    }

    .subtitle {
      color: #8b949e;
      font-size: 0.8rem;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .inputs {
      display: flex;
      gap: 24px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
      min-width: 280px;
    }

    label {
      color: #58a6ff;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    textarea {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      padding: 12px;
      border-radius: 6px;
      resize: vertical;
      height: 320px;
      outline: none;
    }

    textarea:focus { border-color: #58a6ff; }

    .defender-input-wrapper { position: relative; }

    #defender-search {
      background: #161b22;
      border: 1px solid #30363d;
      color: #c9d1d9;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 10px 12px;
      border-radius: 6px;
      width: 100%;
      outline: none;
    }

    #defender-search:focus { border-color: #58a6ff; }

    #dropdown {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #161b22;
      border: 1px solid #30363d;
      border-top: none;
      border-radius: 0 0 6px 6px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
    }

    #dropdown.open { display: block; }

    .dropdown-item {
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .dropdown-item:hover { background: #1f2937; color: #58a6ff; }

    .selected-defenders {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
      min-height: 36px;
    }

    .defender-tag {
      background: #1f2937;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .defender-tag button {
      background: none;
      border: none;
      color: #f85149;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
    }

    #calc-btn {
      background: #58a6ff22;
      border: 1px solid #58a6ff;
      color: #58a6ff;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 12px 32px;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s;
      margin-bottom: 24px;
    }

    #calc-btn:hover { background: #58a6ff44; }

    .error { color: #f85149; font-size: 0.9rem; margin-bottom: 16px; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 0;
    }

    .tab-btn {
      background: none;
      border: 1px solid transparent;
      border-bottom: none;
      color: #8b949e;
      font-family: 'Courier New', monospace;
      font-size: 0.85rem;
      padding: 8px 20px;
      cursor: pointer;
      border-radius: 6px 6px 0 0;
      letter-spacing: 1px;
      transition: color 0.2s;
    }

    .tab-btn:hover { color: #c9d1d9; }

    .tab-btn.active {
      color: #58a6ff;
      border-color: #30363d;
      background: #161b22;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards */
    .player-section { margin-bottom: 28px; }

    .section-header {
      color: #58a6ff;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 1px;
      border-bottom: 1px solid #30363d;
      padding-bottom: 6px;
      margin-bottom: 12px;
    }

    .matchup-cards {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .matchup-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 14px 16px;
      min-width: 260px;
      flex: 1;
    }

    .card-header {
      color: #58a6ff;
      font-size: 0.88rem;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .scenario-label {
      color: #8b949e;
      font-size: 0.75rem;
      margin: 8px 0 4px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .calc-row { font-size: 0.78rem; padding: 2px 0; line-height: 1.5; }

    .ko-guaranteed { color: #f85149; font-weight: bold; }
    .ko-chance     { color: #ff8c00; font-weight: bold; }
    .ko-2hko       { color: #e3b341; font-weight: bold; }

    /* Speed Ladder */
    .speed-ladder {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 600px;
    }

    .speed-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      border-radius: 4px;
      font-size: 0.85rem;
    }

    .speed-player   { background: #1f2937; border-left: 3px solid #58a6ff; }
    .speed-opponent { background: #1a1a2e; border-left: 3px solid #f85149; }

    .speed-name  { color: #c9d1d9; }
    .speed-value { color: #8b949e; font-size: 0.8rem; }

    /* Summary */
    .summary-block { margin-bottom: 24px; }

    .summary-block-header {
      font-size: 0.95rem;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 10px;
      padding-bottom: 4px;
      border-bottom: 1px solid #30363d;
    }

    .summary-row { font-size: 0.82rem; padding: 3px 0; }

    .summary-red    { color: #f85149; }
    .summary-orange { color: #ff8c00; }
    .summary-yellow { color: #e3b341; }
    .summary-cyan   { color: #58a6ff; }
  </style>
</head>
<body>
  <h1>K Calc</h1>
  <p class="subtitle">Competitive Pokémon Analysis Engine</p>

  <div class="inputs">
    <div class="input-group">
      <label>My Team (Showdown Format)</label>
      <textarea id="team-input" placeholder="Paste your team here...
Tip: add boost tags like [+1 Atk] on the first line of each set"></textarea>
    </div>
    <div class="input-group">
      <label>Opponent Threats</label>
      <div class="defender-input-wrapper">
        <input type="text" id="defender-search" placeholder="Search Pokémon..." autocomplete="off" />
        <div id="dropdown"></div>
      </div>
      <div class="selected-defenders" id="selected-defenders"></div>
    </div>
  </div>

  <button id="calc-btn">ANALYZE MATCHUP</button>
  <div id="error" class="error"></div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="tab-offense">⚔ My Offense</button>
    <button class="tab-btn" data-tab="tab-defense">🛡 My Defense</button>
    <button class="tab-btn" data-tab="tab-speed">⚡ Speed Ladder</button>
    <button class="tab-btn" data-tab="tab-summary">📋 Summary</button>
  </div>

  <div id="tab-offense" class="tab-panel active"></div>
  <div id="tab-defense" class="tab-panel"></div>
  <div id="tab-speed" class="tab-panel"></div>
  <div id="tab-summary" class="tab-panel"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
