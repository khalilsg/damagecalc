<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compare — K Calc</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f4f4f2;
      color: #1a1a1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      padding: 24px;
      min-height: 100vh;
    }

    /* ── Header ── */
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .page-header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: 2px; }
    .back-link { font-size: 0.78rem; color: #888; text-decoration: none; }
    .back-link:hover { color: #333; }

    /* ── Form ── */
    .cmp-form {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 24px;
      max-width: 900px;
    }

    .cmp-pickers {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .cmp-picker-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }
    .cmp-picker-label.label-a { color: #2563eb; }
    .cmp-picker-label.label-b { color: #dc2626; }

    .cmp-vs {
      font-size: 0.78rem;
      font-weight: 700;
      color: #bbb;
      text-align: center;
      padding-top: 20px;
    }

    .cmp-input-wrap { position: relative; }

    .cmp-input {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 8px 12px;
      font-family: inherit;
      font-size: 0.88rem;
      background: #fff;
      color: #1a1a1a;
      outline: none;
    }
    .cmp-input:focus { border-color: #555; }
    .cmp-input-a:focus { border-color: #2563eb; }
    .cmp-input-b:focus { border-color: #dc2626; }

    .cmp-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #ccc;
      border-top: none;
      border-radius: 0 0 5px 5px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 100;
      display: none;
    }
    .cmp-dropdown.open { display: block; }
    .cmp-dd-item { padding: 6px 12px; font-size: 0.85rem; cursor: pointer; }
    .cmp-dd-item:hover, .cmp-dd-active { background: #f0f0f0; }

    .cmp-form-row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .cmp-form-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .cmp-form-field label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #555;
    }

    .cmp-form-field select {
      border: 1px solid #ccc;
      border-radius: 5px;
      padding: 7px 10px;
      font-family: inherit;
      font-size: 0.85rem;
      background: #fff;
      color: #1a1a1a;
      outline: none;
      cursor: pointer;
    }
    .cmp-form-field select:focus { border-color: #555; }

    .cmp-btn {
      background: #111;
      color: #fff;
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 10px 28px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .cmp-btn:hover    { background: #333; }
    .cmp-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .cmp-error {
      color: #c0392b;
      font-size: 0.82rem;
      margin-top: 8px;
      min-height: 18px;
    }

    /* ── Section title ── */
    .cmp-section-title {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #aaa;
      margin: 0 0 12px;
    }

    /* ── Stats ── */
    #cmp-stats {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
      max-width: 900px;
    }

    .cmp-stats-names {
      display: grid;
      grid-template-columns: 1fr 52px 1fr;
      gap: 8px;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .cmp-stats-name {
      font-size: 0.92rem;
      font-weight: 700;
    }
    .cmp-stats-name-a { color: #2563eb; text-align: right; }
    .cmp-stats-name-b { color: #dc2626; text-align: left; }

    .cmp-stat-row {
      display: grid;
      grid-template-columns: 1fr 52px 1fr;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .cmp-stat-row.cmp-bst-row {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #f0f0f0;
    }

    .cmp-side-a {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: flex-end;
    }

    .cmp-side-b {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cmp-stat-val {
      font-size: 0.82rem;
      font-weight: 700;
      width: 32px;
      font-variant-numeric: tabular-nums;
      flex-shrink: 0;
    }
    .cmp-val-a { text-align: right; color: #aaa; }
    .cmp-val-b { text-align: left;  color: #aaa; }
    .cmp-val-a.higher { color: #2563eb; }
    .cmp-val-b.higher { color: #dc2626; }
    .cmp-val-a.tied, .cmp-val-b.tied { color: #555; }
    .cmp-bst-val { font-size: 0.9rem; }

    .cmp-bar-track {
      flex: 1;
      position: relative;
      height: 8px;
      background: #eee;
      border-radius: 4px;
      overflow: hidden;
    }

    .cmp-bar-fill {
      position: absolute;
      top: 0;
      height: 100%;
      border-radius: 4px;
      transition: width 0.25s ease;
    }

    /* A side: bar anchored to right edge (grows inward) */
    .cmp-side-a .cmp-bar-fill {
      right: 0;
      background: #93c5fd; /* blue-300, muted default */
    }
    .cmp-side-a .cmp-bar-fill.higher { background: #2563eb; }
    .cmp-side-a .cmp-bar-fill.tied   { background: #555; }

    /* B side: bar anchored to left edge */
    .cmp-side-b .cmp-bar-fill {
      left: 0;
      background: #fca5a5; /* red-300, muted default */
    }
    .cmp-side-b .cmp-bar-fill.higher { background: #dc2626; }
    .cmp-side-b .cmp-bar-fill.tied   { background: #555; }

    .cmp-stat-center-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #999;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .cmp-bst-center-label {
      font-size: 0.65rem;
      font-weight: 700;
      color: #555;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    /* ── Moves ── */
    #cmp-moves-wrap {
      max-width: 900px;
      margin-bottom: 32px;
    }

    .cmp-moves-col-headers {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cmp-col-header {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 6px 10px;
      border-radius: 5px 5px 0 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .cmp-col-header-a      { background: #eff6ff; color: #2563eb; }
    .cmp-col-header-shared { background: #f0fdf4; color: #16a34a; }
    .cmp-col-header-b      { background: #fef2f2; color: #dc2626; }

    .cmp-col-count {
      font-size: 0.72rem;
      font-weight: 700;
      background: rgba(0,0,0,0.08);
      border-radius: 10px;
      padding: 1px 7px;
    }

    .cmp-moves-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .cmp-moves-col {
      background: #fff;
      border: 1px solid #e5e5e5;
      border-radius: 0 0 8px 8px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      min-height: 60px;
    }

    .cmp-col-a      { border-top: 3px solid #2563eb; }
    .cmp-col-shared { border-top: 3px solid #16a34a; }
    .cmp-col-b      { border-top: 3px solid #dc2626; }

    .cmp-move-chip {
      display: block;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 4px 9px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      cursor: default;
    }

    .cmp-chip-a      { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .cmp-chip-shared { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
    .cmp-chip-b      { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }

    .cmp-no-data {
      font-size: 0.75rem;
      color: #bbb;
      font-style: italic;
      padding: 4px 0;
    }

    .cmp-loading {
      font-size: 0.8rem;
      color: #aaa;
      padding: 12px 0;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>COMPARE</h1>
    <a class="back-link" href="/damagecalc/">← Back to K Calc</a>
  </div>

  <div class="cmp-form">
    <div class="cmp-pickers">
      <div>
        <div class="cmp-picker-label label-a">Pokémon A</div>
        <div class="cmp-input-wrap">
          <input id="cmp-input-a" class="cmp-input cmp-input-a" placeholder="e.g. Blastoise-Mega" autocomplete="off" />
          <div id="cmp-dd-a" class="cmp-dropdown"></div>
        </div>
      </div>
      <div class="cmp-vs">VS</div>
      <div>
        <div class="cmp-picker-label label-b">Pokémon B</div>
        <div class="cmp-input-wrap">
          <input id="cmp-input-b" class="cmp-input cmp-input-b" placeholder="e.g. Incineroar" autocomplete="off" />
          <div id="cmp-dd-b" class="cmp-dropdown"></div>
        </div>
      </div>
    </div>
    <div class="cmp-form-row">
      <button id="cmp-btn" class="cmp-btn">COMPARE</button>
    </div>
    <div id="cmp-error" class="cmp-error"></div>
  </div>

  <div id="cmp-results" style="display:none">
    <div class="cmp-section-title">BASE STATS</div>
    <div id="cmp-stats"></div>

    <div class="cmp-section-title">CHAMPIONS MOVEPOOL</div>
    <div id="cmp-moves-wrap">
      <div class="cmp-moves-col-headers" id="cmp-move-headers"></div>
      <div class="cmp-moves-grid" id="cmp-moves"></div>
    </div>
  </div>

  <script type="module" src="/src/comparePage.js"></script>
</body>
</html>
